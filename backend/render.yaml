services:
  - type: web
    name: shl-assessment-recommender-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: ENABLE_GEMINI
        value: "true"
      - key: GEMINI_FLASH_MODEL
        value: gemini-1.5-flash
      - key: GEMINI_PRO_MODEL
        value: gemini-1.5-pro
      - key: CORS_ORIGINS
        value: https://your-frontend.example.com,http://localhost:3000

